name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  packages: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check shell scripts
        run: find . -name '*.sh' -not -path './test-repos/*' | xargs bash -n

      - name: Validate JSON schemas
        run: |
          sudo apt-get install -y jq
          for f in schemas/*.json; do jq empty "$f" && echo "  $f: OK"; done

  test:
    runs-on: ubuntu-latest
    needs: syntax
    container:
      image: ghcr.io/joelbarmettleruzh/ultrainit-test:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Unit tests
        run: bats tests/unit/

      - name: Validator script tests
        run: bats tests/scripts/

      - name: Edge case tests
        run: bats tests/edge/

      - name: Integration tests
        if: always()
        run: bats tests/integration/ || true

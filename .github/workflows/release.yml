name: Release

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Determine bump type
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          LABELS=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
            --jq '.[0].labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -qx 'release:skip'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qx 'release:major'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qx 'release:minor'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          LATEST=${LATEST:-v0.0.0}
          IFS='.' read -r MAJ MIN PAT <<< "${LATEST#v}"
          case "${{ steps.bump.outputs.bump }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW="v${MAJ}.${MIN}.${PAT}"
          echo "Previous: $LATEST  →  New: $NEW"
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Install jq
        if: steps.bump.outputs.skip != 'true'
        run: sudo apt-get install -y jq

      - name: Bundle ultrainit.sh
        if: steps.bump.outputs.skip != 'true'
        run: |
          mkdir -p dist
          bash bundle.sh > dist/ultrainit.sh
          chmod +x dist/ultrainit.sh
          echo "Bundle size: $(wc -c < dist/ultrainit.sh) bytes"

      - name: Verify bundle
        if: steps.bump.outputs.skip != 'true'
        run: bash -n dist/ultrainit.sh

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/ultrainit.sh
          generate_release_notes: true
          body: |
            ## Usage

            ```bash
            curl -sL https://github.com/joelbarmettlerUZH/ultrainit.sh/releases/latest/download/ultrainit.sh | bash
            ```

            Or with options:

            ```bash
            bash <(curl -sL https://github.com/joelbarmettlerUZH/ultrainit.sh/releases/latest/download/ultrainit.sh) --non-interactive /path/to/project
            ```

            See [README](https://github.com/joelbarmettlerUZH/ultrainit.sh#readme) for full documentation.
